<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>📋 Task Manager</h1>
        <p class="subtitle">Beheer je taken eenvoudig</p>
      </div>

      <div class="input-section">
        <input
          type="text"
          id="taskInput"
          placeholder="Voer een nieuwe taak in..."
          class="task-input"
        />
        <textarea
          id="descriptionInput"
          placeholder="Beschrijving (optioneel)..."
          class="task-description"
        ></textarea>
        <button id="addBtn" class="btn btn-primary">Taak toevoegen</button>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat-label">Totaal:</span>
          <span id="totalTasks" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Voltooid:</span>
          <span id="completedTasks" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Openstaand:</span>
          <span id="pendingTasks" class="stat-value">0</span>
        </div>
      </div>

      <div class="filter-section">
        <button id="filterAll" class="filter-btn active">Alle</button>
        <button id="filterPending" class="filter-btn">Openstaand</button>
        <button id="filterCompleted" class="filter-btn">Voltooid</button>
        <button id="clearCompleted" class="btn btn-danger">
          Voltooide verwijderen
        </button>
      </div>

      <div id="tasksList" class="tasks-list">
        <!-- Tasks will be added here -->
      </div>

      <div id="emptyState" class="empty-state">
        <p>📭 Geen taken. Voeg er één toe om te beginnen!</p>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
